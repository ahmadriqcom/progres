<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status LK Unit Kerja 2024</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e0f2fe, #ecfeff);
      margin: 0;
      min-height: 100vh;
    }

    .container {
      height: 100vh;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    h1 {
      margin: 0 0 6px 0;
      text-align: center;
      color: #0f172a;
      font-size: clamp(16px, 2.5vw, 22px);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      flex-wrap: wrap;
      gap: 6px;
    }

    .filter-box {
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 13px;
    }

    .filter-box select {
      padding: 5px 8px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
    }

    .table-wrapper {
      flex: 1;
      overflow: auto;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: clamp(11px, 1.8vw, 14px);
    }

    thead {
      position: sticky;
      top: 0;
      background: linear-gradient(90deg, #22c55e, #84cc16);
      color: white;
      z-index: 2;
    }

    th, td {
      padding: clamp(6px, 1vw, 10px);
      border-bottom: 1px solid #e5e7eb;
      text-align: left;
    }

    tbody tr:hover {
      background: #f0fdf4;
    }

    select.status-select {
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: inherit;
      cursor: pointer;
      width: 100%;
    }

    .status {
      text-align: center;
      font-weight: 600;
      border-radius: 999px;
      padding: 4px 8px;
      color: white;
      display: inline-block;
      min-width: 80px;
    }

    .status-belum {
      background: linear-gradient(90deg, #ef4444, #f97316);
    }

    .status-sudah {
      background: linear-gradient(90deg, #22c55e, #16a34a);
    }

    .footer {
      margin-top: 4px;
      text-align: right;
      font-size: 10px;
      color: #64748b;
    }

    @media (max-width: 600px) {
      .top-bar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Monitoring LK Tahun 2024</h1>

    <div class="top-bar">
      <div class="filter-box">
        <strong>Filter Status:</strong>
        <select id="filterSelect" onchange="applyFilter()">
          <option value="all">Semua</option>
          <option value="belum">Belum Input</option>
          <option value="sudah">Sudah Input</option>
        </select>
      </div>

      <div style="font-size:12px;color:#475569">
        Auto Save Aktif
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th style="width:50px">No</th>
            <th>Nama Unit Kerja</th>
            <th style="width:160px">LK 2024</th>
            <th style="width:120px">Status</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="footer">Monitoring LK • Filter + Auto Save</div>
  </div>

  <script>
    const units = [
      "Puskesmas Kampung Jabi",
      "UPT Puskesmas Baloi Permai",
      "UPT Puskesmas Batu Aji",
      "UPT Puskesmas Belakang Padang",
      "UPT Puskesmas Botania",
      "UPT Puskesmas Bulang",
      "UPT Puskesmas Galang",
      "UPT Puskesmas Kabil",
      "UPT Puskesmas Lubuk Baja",
      "UPT Puskesmas Mentarau",
      "UPT Puskesmas Rempang Cate",
      "UPT Puskesmas Sambau",
      "UPT Puskesmas Sei Langkai",
      "UPT Puskesmas Sei Lekop",
      "UPT Puskesmas Sei Panas",
      "UPT Puskesmas Sei Pancur",
      "UPT Puskesmas Sekupang",
      "UPT Puskesmas Tanjung Buntung",
      "UPT Puskesmas Tanjung Sengkuang",
      "UPT Puskesmas Tanjung Uncang",
      "UPT Puskesmas Tiban Baru"
    ];

    const tbody = document.getElementById("tableBody");
    const savedData = JSON.parse(localStorage.getItem("lk_status_2024") || "{}");

    function renderTable() {
      tbody.innerHTML = "";

      units.forEach((unit, index) => {
        const savedValue = savedData[index] || "belum";

        const row = document.createElement("tr");
        row.dataset.status = savedValue;

        row.innerHTML = `
          <td>${index + 1}</td>
          <td>${unit}</td>
          <td>
            <select class="status-select" onchange="updateStatus(this, ${index})">
              <option value="belum" ${savedValue === 'belum' ? 'selected' : ''}>Belum Input</option>
              <option value="sudah" ${savedValue === 'sudah' ? 'selected' : ''}>Sudah Input</option>
            </select>
          </td>
          <td style="text-align:center">
            <span id="status-${index}" class="status ${savedValue === 'sudah' ? 'status-sudah' : 'status-belum'}">
              ${savedValue === 'sudah' ? '✔ Sudah' : 'Belum'}
            </span>
          </td>
        `;

        tbody.appendChild(row);
      });

      applyFilter();
    }

    function updateStatus(select, index) {
      const value = select.value;
      savedData[index] = value;
      localStorage.setItem("lk_status_2024", JSON.stringify(savedData));

      renderTable();
    }

    function applyFilter() {
      const filter = document.getElementById("filterSelect").value;
      const rows = tbody.querySelectorAll("tr");

      rows.forEach(row => {
        if (filter === "all") {
          row.style.display = "";
        } else {
          row.style.display = row.dataset.status === filter ? "" : "none";
        }
      });
    }

    renderTable();
  </script>
</body>
</html>
